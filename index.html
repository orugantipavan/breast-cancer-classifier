<!DOCTYPE html>
<html>
<head>
    <title>Breast Cancer Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }
        
        .inputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        label {
            font-size:11px;
            margin-bottom: 4px;
            color: #cbd5f5;
            word-wrap: break-word;
        }

        input {
            padding: 8px;
            border-radius: 6px;
            border: none;
            width: 100%;
            box-sizing:border-box;
        }

        button {
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }
        
        button:hover {
            background: #16a34a;
        }
        
        #loading {
            margin-top: 15px; 
            display: none;
        }

        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            font-size: 20px;
        }

        .bengin {
            background: #065f46;
        }

        .malignant {
            background: #7f1d1d;
        }

        .error {
            color: red;
            margin-top: 15px;
        }
        
    </style>
</head>

<body>

    <h1>Breast Cancer Prediction</h1>
    
    <div class="container">

        <p>Enter all 30 feature values:</p>
    
        <div class="inputs" id="inputs"></div>

        <button onclick="predict()">Predict</button>
    
        <div id="loading">Predicting...</div>
    
        <div id="result"></div>
        <div id="error" class="error"></div>

    </div>

<script>

const inputDiv = document.getElementById("inputs");

// Create 30 input boxes with labels
const featureNames = [
    "Mean Radius", "Mean Texture", "Mean Perimeter", "Mean Area", "Mean Smoothness",
    "Mean Compactness", "Mean Concavity", "Mean Concave Points", "Mean Symmetry", "Mean Fractal Dimension",

    "Radius SE", "Texture SE", "Perimeter SE", "Area SE", "Smoothness SE",
    "Compactness SE", "Concavity SE", "Concave Points SE", "Symmetry SE", "Fractal Dimension SE",

    "Worst Radius", "Worst Texture", "Worst Perimeter", "Worst Area", "Worst Smoothness",
    "Worst Compactness", "Worst Concavity", "Worst Concave Points", "Worst Symmetry", "Worst Fractal Dimension"
];

for (let i = 0; i < featureNames.length; i++) { 

    let group = document.createElement("div");
    group.className = "input-group";
    
    let label = document.createElement("label");
    label.innerText = featureNames[i];
    
    let input = document.createElement("input");
            input.type = "number";
            input.step = "any";

            group.appendChild(label);
            group.appendChild(input);

            inputDiv.appendChild(group);
}

async function predict() {
    
    const inputs = document.querySelectorAll("#inputs input");
    let values = [];

    // clear previous messages
    document.getElementById("error").innerText = "";
    
    document.getElementById("result").innerHTML = "";
    
    for (let input of inputs) {
        if (input.value === "") {
            document.getElementById("error").innerText = "Please fill all 30 values";
            return;
        }
        values.push(parseFloat(input.value));
    }    
    
    document.getElementById("loading").style.display = "block";

    try {
        const response = await fetch("https://breast-cancer-classifier-4.onrender.com/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ features: values })
        });

        const data = await response.json();

        document.getElementById("loading").style.display = "none";
        
        let resultDiv = document.getElementById("result"); 
        
        if (data.result === "Benign") {
            resultDiv.innerHTML = `<div class="result-box bengin">Benign (Non-cancer)</div>`;  
        } else {
            resultDiv.innerHTML = `<div class="result-box malignant">Malignant (Cancer Detected)</div>`;  
        }

    } catch (err) {
        document.getElementById("loading").style.display = "none";

        document.getElementById("error").innerHTML = " Cannot connect to API. Try again.";
    }
}
            
  
    </script>

</body>
</html>
