<!DOCTYPE html>
<html>
<head>
    <title>Breast Cancer Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }
        
        .inputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        label {
            font-size:11px;
            margin-bottom: 4px;
            color: #cbd5f5;
            word-wrap: break-word;
        }

        input {
            padding: 8px;
            border-radius: 6px;
            border: none;
            width: 100%;
            box-sizing:border-box;
        }

        button {
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }
        
        button:hover {
            background: #16a34a;
        }
        
        #loading {
            margin-top: 15px; 
            display: none;
        }

        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            font-size: 20px;
        }

        .benign {
            background: #065f46;
        }

        .malignant {
            background: #7f1d1d;
        }

        .error {
            color: red;
            margin-top: 15px;
        }
        
    </style>
</head>

<body>

    <h1>Breast Cancer Prediction</h1>
    
    <div class="container">

        <p>Auto-filled real sample (you can edit values):</p>
    
        <div class="inputs" id="inputs"></div>

        <button onclick="predict()">Predict</button>
    
        <div id="loading">Predicting...</div>
    
        <div id="result"></div>
        <div id="error" class="error"></div>

    </div>

<script>

const inputDiv = document.getElementById("inputs");

// Create 30 input boxes with labels
const featureNames = [
    "Mean Radius", "Mean Texture", "Mean Perimeter", "Mean Area", "Mean Smoothness",
    "Mean Compactness", "Mean Concavity", "Mean Concave Points", "Mean Symmetry", "Mean Fractal Dimension",

    "Radius Error", "Texture Error", "Perimeter Error", "Area Error", "Smoothness Error",
    "Compactness Error", "Concavity Error", "Concave Points Error", "Symmetry Error", "Fractal Dimension Error",

    "Worst Radius", "Worst Texture", "Worst Perimeter", "Worst Area", "Worst Smoothness",
    "Worst Compactness", "Worst Concavity", "Worst Concave Points", "Worst Symmetry", "Worst Fractal Dimension"
];

//Real dataset sample (IMPORTANT)
const defaultValues = [17.99, 10.38, 122.8, 1001, 0.1184, 0.2776, 0.3001, 0.1471, 0.2419, 0.07871,
                       1.095, 0.9053, 8.589, 153.4, 0.006399, 0.04904, 0.05373, 0.01587, 0.03003, 0.006193,
                       25.38, 17.33, 184.6, 2019, 0.1622, 0.6656, 0.7119, 0.2654, 0.4601, 0.1189];
//Create inputs                     
for (let i = 0; i < featureNames.length; i++) { 

    let group = document.createElement("div");
    group.className = "input-group";
    
    let label = document.createElement("label");
    label.innerText = featureNames[i];
    
    let input = document.createElement("input");
            input.value = defaultValues[i];
            input.step = "any";

            group.appendChild(label);
            group.appendChild(input);

            inputDiv.appendChild(group);
}

async function predict() {
    
    const inputs = document.querySelectorAll("#inputs input");
    let values = [];

    // clear previous messages
    document.getElementById("error").innerText = "";
    
    document.getElementById("result").innerHTML = "";
    
    for (let input of inputs) {
        if (input.value === "") {
            document.getElementById("error").innerText = "Please fill all 30 values";
            return;
        }
        values.push(parseFloat(input.value));
    }    
    
    document.getElementById("loading").style.display = "block";

    try {
        const response = await fetch("https://breast-cancer-classifier-5.onrender.com/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ features: values })
        });

        const data = await response.json();

        document.getElementById("loading").style.display = "none";
        
        let resultDiv = document.getElementById("result"); 
        
        if (data.result === "Benign") {
            resultDiv.innerHTML = `<div class="result-box benign">Benign (Non-cancer)</div>`;  
        } else {
            resultDiv.innerHTML = `<div class="result-box malignant">Malignant (Cancer Detected)</div>`;  
        }

    } catch (err) {
        document.getElementById("loading").style.display = "none";

        document.getElementById("error").innerHTML = " Cannot connect to API. Try again.";
    }
}
            
  
    </script>

</body>
</html>
